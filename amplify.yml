version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Injecting game server URL"
        - |
          if [ -n "$GAME_SERVER_URL" ]; then
            echo "window.GAME_SERVER_URL = '$GAME_SERVER_URL';" > client/env.js
          else
            echo "window.GAME_SERVER_URL = '';" > client/env.js
            echo "WARNING - Set GAME_SERVER_URL in Amplify environment variables"
          fi
    build:
      commands:
        - echo "Static client — no build required"
  artifacts:
    baseDirectory: client
    files:
      - '**/*'
  cache:
    paths: []
